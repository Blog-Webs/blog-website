<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Alert — httpTechNex</title>
</head>
<body style="margin:0;padding:0;background:#0f1117;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0f1117;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="background:#1a1d2e;border-radius:16px;overflow:hidden;border:1px solid rgba(239,68,68,0.3);">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#dc2626,#b91c1c);padding:24px 36px;">
              <p style="margin:0;font-size:11px;color:rgba(255,255,255,0.7);letter-spacing:1px;text-transform:uppercase;">Admin Notification</p>
              <h1 style="margin:6px 0 0;font-size:20px;color:#fff;font-family:monospace;">httpTechNex</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px 36px;">
              <!-- Alert badge -->
              <p style="margin:0 0 16px;">
                <span style="display:inline-block;background:rgba(239,68,68,0.15);color:#ef4444;font-size:11px;font-weight:600;padding:4px 12px;border-radius:50px;letter-spacing:0.5px;text-transform:uppercase;">
                  {{alertType}}
                </span>
              </p>

              <h2 style="margin:0 0 12px;font-size:18px;color:#e2e8f0;">{{alertTitle}}</h2>
              <p style="margin:0 0 24px;font-size:14px;color:#94a3b8;line-height:1.7;">{{alertMessage}}</p>

              {{#if metadata}}
              <table width="100%" cellpadding="0" cellspacing="0"
                     style="background:#12151f;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px;">
                <tr>
                  <td style="font-size:13px;color:#64748b;font-family:monospace;white-space:pre-wrap;word-break:break-all;">
                    {{metadata}}
                  </td>
                </tr>
              </table>
              {{/if}}

              <p style="margin:20px 0 0;font-size:13px;color:#475569;">
                Triggered at: <strong style="color:#e2e8f0;">{{timestamp}}</strong>
              </p>

              <!-- Admin portal link -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:24px;">
                <tr>
                  <td>
                    <a href="https://www.httptechnex.online/admin-portal"
                       style="display:inline-block;background:#1e2130;border:1px solid rgba(99,102,241,0.3);color:#6366f1;text-decoration:none;font-size:13px;font-weight:600;padding:10px 24px;border-radius:8px;">
                      Open Admin Portal →
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:16px 36px;border-top:1px solid rgba(255,255,255,0.06);text-align:center;">
              <p style="margin:0;font-size:12px;color:#334155;">
                This is an automated admin notification from httpTechNex.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
